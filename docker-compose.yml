name: rezno

services:
  postgres:
    image: postgres:17-alpine
    container_name: rezno-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: rezno
      POSTGRES_USER: rezno
      POSTGRES_PASSWORD: change_me_in_prod

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezno"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - rezno-network

  redis:
    image: redis:7-alpine
    container_name: rezno-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - rezno-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: rezno-mailpit

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - rezno-network

volumes:
  postgres_data:
  redis_data:

networks:
  rezno-network:
    driver: bridge